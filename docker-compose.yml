services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: zerith
      POSTGRES_USER: zerith
      POSTGRES_PASSWORD: zerith
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./simulator/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:
