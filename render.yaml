databases:
  - name: zerith-db
    databaseName: zerith
    user: zerith
    plan: free

services:
  - type: web
    name: zerith-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zerith-db
          property: connectionString
      - key: MQTT_ENABLED
        value: "false"
      - key: PORT
        value: "8080"

  - type: web
    name: zerith-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_WS_URL
        value: wss://zerith-backend.onrender.com/ws
